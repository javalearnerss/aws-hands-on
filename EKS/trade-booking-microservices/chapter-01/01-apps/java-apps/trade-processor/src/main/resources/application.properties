spring.application.name=trade-processor

server.port=9060

consumer.props.consumer-group=trade-processor
consumer.props.auto-commit=false
consumer.props.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
consumer.props.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

consumer.trade.processor.topic=nse.enriched.trade.events
consumer.trade.processor.retry.count=3
consumer.trade.processor.backoff=2000
consumer.trade.processor.multiplier=2

spring.datasource.url=jdbc:h2:mem:trade_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

refdata-provider.url=http://127.0.0.1:9063

spring.jpa.defer-datasource-initialization=true

spring.kafka.bootstrap-servers=localhost:9092

logging.level.org.springframework.security=DEBUG