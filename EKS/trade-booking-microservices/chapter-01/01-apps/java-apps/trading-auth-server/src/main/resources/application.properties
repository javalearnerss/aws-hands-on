spring.application.name=trading-auth-server

server.port=9064

spring.datasource.url=jdbc:h2:mem:auth_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console




# Cors config
app.cors.allowed-origins=https://127.0.0.1:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With
app.cors.exposed-headers=Location
app.cors.allow-credentials=true
app.cors.max-age=3600

internal.cert.folder.path=D:/study/ssl/certificates/https/auth-server-internal-cert
key.store.password=sandeep


server.ssl.enabled=true
server.ssl.key-store=file:D:/study/ssl/certificates/https/trading-auth-server/trading-auth-server.p12
server.ssl.key-store-password=sandeep
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=trading-auth-server

logging.level.org.springframework.security=DEBUG

