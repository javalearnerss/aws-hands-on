spring.application.name=trade-enricher

server.port=9062

consumer.props.consumer-group=trade-enricher
consumer.props.auto-commit=false
consumer.props.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
consumer.props.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

consumer.trade.enricher.topic=nse.trade.events
consumer.trade.enricher.retry.count=3
consumer.trade.enricher.backoff=2000
consumer.trade.enricher.multiplier=2

producer.trade.enricher.topic=nse.enriched.trade.events

# Performance / Batching
kafka.producer.batch-size=16384
kafka.producer.linger-ms=5
kafka.producer.compression-type=lz4

# Reliability
kafka.producer.ack-strategy=all
kafka.producer.retries=5
kafka.producer.retry-backoff-ms=1000
kafka.producer.idempotence=true

# Timeouts
kafka.producer.request-timeout=30000
kafka.producer.delivery-timeout=120000

# Serializers
kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Transaction
kafka.producer.trans-id-prefix=exchange-producer

spring.kafka.bootstrap-servers=localhost:9092
