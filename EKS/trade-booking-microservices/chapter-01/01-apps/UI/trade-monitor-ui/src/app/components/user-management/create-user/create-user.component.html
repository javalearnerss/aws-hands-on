<div class="page-wrapper">

    <!-- Page Header -->
    <div class="page-header">

        <div class="header-left">
            <h1>Create User</h1>
            <p>Register users, assign roles, scopes and audiences.</p>
        </div>

    </div>


    <!-- Form Card -->
    <div class="content-card">

        <form [formGroup]="userForm" (ngSubmit)="register()">

            <div class="grid-2">

                <!-- Username -->
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" formControlName="username">

                    <div class="error" *ngIf="f.username.touched && f.username.invalid">
                        <small *ngIf="f.username.errors?.['required']">
                            Username is required
                        </small>

                        <small *ngIf="f.username.errors?.['minlength']">
                            Username must be at least 4 characters
                        </small>
                    </div>
                </div>


                <!-- Email -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" formControlName="email">

                    <div class="error" *ngIf="f.email.touched && f.email.invalid">
                        <small *ngIf="f.email.errors?.['required']">
                            Email is required
                        </small>

                        <small *ngIf="f.email.errors?.['email']">
                            Invalid email format
                        </small>
                    </div>
                </div>


                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" formControlName="password">

                    <div class="error" *ngIf="f.password.touched && f.password.invalid">
                        <small *ngIf="f.password.errors?.['required']">
                            Password is required
                        </small>

                        <small *ngIf="f.password.errors?.['minlength']">
                            Password must be at least 6 characters
                        </small>
                    </div>
                </div>


                <!-- Tenant -->
                <div class="form-group">
                    <label>Tenant ID</label>
                    <input type="text" formControlName="tenantId">

                    <div class="error" *ngIf="f.tenantId.touched && f.tenantId.invalid">
                        <small *ngIf="f.tenantId.errors?.['required']">
                            Tenant ID is required
                        </small>
                    </div>
                </div>

            </div>


            <!-- Enabled -->
            <div class="form-group full-width">
                <label>Enabled</label>

                <select formControlName="enabled">
                    <option [value]="true">Enabled</option>
                    <option [value]="false">Disabled</option>
                </select>
            </div>


            <div class="grid-2">

                <div class="form-group">
                    <label>Roles</label>

                    <div class="checkbox-group">

                        <label class="checkbox-item" *ngFor="let role of roles">

                            <input type="checkbox" [value]="role.id" (change)="onRoleChange($event)">

                            {{role.name}}

                        </label>

                    </div>

                </div>


                <!-- Audiences -->
                <div class="form-group">
                    <label>Audiences</label>

                    <div class="checkbox-group">

                        <label class="checkbox-item" *ngFor="let aud of audiences">

                            <input type="checkbox" [value]="aud.id" (change)="onAudienceChange($event)">

                            {{aud.name}}

                        </label>

                    </div>

                </div>

            </div>


            <!-- Scopes -->
            <div class="form-group full-width">
                <label>Scopes</label>

                <div class="checkbox-group">

                    <label class="checkbox-item" *ngFor="let scope of scopes">

                        <input type="checkbox" [value]="scope.id" (change)="onScopeChange($event)">

                        {{scope.name}}

                    </label>

                </div>

            </div>


            <div class="actions">

                <button class="btn-primary" type="submit" [disabled]="userForm.invalid">
                    Create User
                </button>

            </div>

        </form>

    </div>

</div>
