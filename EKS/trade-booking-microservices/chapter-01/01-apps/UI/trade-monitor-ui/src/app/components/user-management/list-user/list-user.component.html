<h2>Users</h2>

<table class="users-table">

<thead>
<tr>
<th>Username</th>
<th>Email</th>
<th>Tenant</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let user of users">

<td>{{user.username}}</td>
<td>{{user.email}}</td>
<td>{{user.tenantId}}</td>

<td>
<span [class.enabled]="user.enabled">
{{user.enabled ? 'Enabled':'Disabled'}}
</span>
</td>

<td>

<button (click)="viewUser(user)">View</button>

<button [routerLink]="['/users/edit', user.id]">
Edit
</button>

</td>

</tr>

</tbody>

</table>
