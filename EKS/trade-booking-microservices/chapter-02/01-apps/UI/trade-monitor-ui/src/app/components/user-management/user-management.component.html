<div class="user-management-container">

  <!-- Header -->
  <div class="user-header">

    <div class="user-header-left">
      <h2>User Management</h2>
      <p>Manage system users, roles and access.</p>
    </div>

    <div class="user-header-right">

      <input
        type="text"
        class="user-search"
        placeholder="Search users..."
      />

      <button class="create-user-btn">
        + Create User
      </button>

    </div>

  </div>


  <!-- Table Card -->
  <div class="user-table-card">

    <table class="user-table">

      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Tenant</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr>
          <td>sandeep</td>
          <td>sandeepgmail.com</td>
          <td>nse-prod</td>

          <td>
            <span class="status enabled">
              Enabled
            </span>
          </td>

          <td class="actions">

            <button class="view-btn">
              View
            </button>

            <button class="edit-btn">
              Edit
            </button>

            <button class="disable-btn">
              Disable
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
