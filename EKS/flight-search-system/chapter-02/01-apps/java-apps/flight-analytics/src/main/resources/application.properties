spring.application.name=flight-analytics


server.port=7072

spring.kafka.bootstrap-servers=localhost:9092


topic.flight-search=flight-search-events



consumer.props.consumer-group=flight-analytics-group
consumer.props.auto-commit=false



# Cors config
app.cors.allowed-origins=http://localhost:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With
app.cors.exposed-headers=Location
app.cors.allow-credentials=true
app.cors.max-age=3600

