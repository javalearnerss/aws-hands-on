spring.application.name=flight-search


server.port=7071

flight.availability.url=http://localhost:7070

spring.kafka.bootstrap-servers=localhost:9092


# Kafka Producer Bootstrap
kafka.producer.bootstrap-servers=localhost:9092

# Performance / Batching
kafka.producer.batch-size=16384
kafka.producer.linger-ms=5
kafka.producer.compression-type=lz4

# Reliability
kafka.producer.ack-strategy=all
kafka.producer.retries=5
kafka.producer.retry-backoff-ms=1000
kafka.producer.idempotence=true

# Timeouts
kafka.producer.request-timeout=30000
kafka.producer.delivery-timeout=120000

topic.flight-search=flight-search-events



# Cors config
app.cors.allowed-origins=http://localhost:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With
app.cors.exposed-headers=Location
app.cors.allow-credentials=true
app.cors.max-age=3600
